<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="56%">
      <stop offset="0%" stop-color="#1e2f5e"/>
      <stop offset="100%" stop-color="#0d1220"/>
    </radialGradient>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a4070"/>
      <stop offset="100%" stop-color="#0f2448"/>
    </linearGradient>
    <linearGradient id="bodyLight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3a5080"/>
      <stop offset="60%" stop-color="#1a3060"/>
      <stop offset="100%" stop-color="#0f2448"/>
    </linearGradient>
    <radialGradient id="lensG" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#40e8d4"/>
      <stop offset="100%" stop-color="#0f9b8e"/>
    </radialGradient>
    <radialGradient id="specimenG" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#ff8090"/>
      <stop offset="100%" stop-color="#c03048"/>
    </radialGradient>
    <filter id="sh">
      <feDropShadow dx="1" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="44" fill="url(#bg)"/>

  <!-- ══ Microscope (same geometry, scaled to 0.72 and shifted left) ══ -->
  <g transform="translate(-20, 8) scale(0.72)">

    <!-- Base -->
    <rect x="38" y="218" width="180" height="18" rx="7" fill="url(#body)" filter="url(#sh)"/>
    <rect x="44" y="218" width="168" height="4" rx="3" fill="#3a5080" opacity="0.5"/>

    <!-- Column -->
    <rect x="148" y="68" width="42" height="154" rx="6" fill="url(#bodyLight)" filter="url(#sh)"/>
    <rect x="150" y="72" width="7" height="146" rx="3" fill="#3a5280" opacity="0.45"/>

    <!-- Horizontal bridge -->
    <rect x="82" y="68" width="76" height="30" rx="6" fill="url(#bodyLight)" filter="url(#sh)"/>

    <!-- Head body -->
    <rect x="72" y="32" width="86" height="48" rx="8" fill="url(#bodyLight)" filter="url(#sh)"/>
    <rect x="78" y="34" width="74" height="8" rx="4" fill="#3a5888" opacity="0.5"/>
    <!-- Trinocular port -->
    <rect x="114" y="28" width="18" height="10" rx="4" fill="#0a1830" stroke="#0f9b8e" stroke-width="1.2"/>
    <ellipse cx="123" cy="28" rx="6" ry="3" fill="url(#lensG)" opacity="0.7" filter="url(#glow)"/>

    <!-- Left eyepiece -->
    <g transform="rotate(-22, 88, 42)">
      <rect x="70" y="28" width="16" height="30" rx="7" fill="url(#body)" filter="url(#sh)"/>
      <ellipse cx="78" cy="28" rx="8" ry="4" fill="#0d1828" stroke="#0f9b8e" stroke-width="1.5"/>
      <ellipse cx="78" cy="28" rx="5" ry="2.5" fill="url(#lensG)" filter="url(#glow)"/>
    </g>
    <!-- Right eyepiece -->
    <g transform="rotate(22, 142, 42)">
      <rect x="144" y="28" width="16" height="30" rx="7" fill="url(#body)" filter="url(#sh)"/>
      <ellipse cx="152" cy="28" rx="8" ry="4" fill="#0d1828" stroke="#0f9b8e" stroke-width="1.5"/>
      <ellipse cx="152" cy="28" rx="5" ry="2.5" fill="url(#lensG)" filter="url(#glow)"/>
    </g>

    <!-- Lamp housing -->
    <rect x="44" y="48" width="36" height="24" rx="6" fill="url(#body)" filter="url(#sh)"/>
    <rect x="28" y="54" width="22" height="12" rx="5" fill="#0a1828" stroke="#3a5888" stroke-width="1"/>
    <ellipse cx="28" cy="60" rx="4" ry="6" fill="#e94560" opacity="0.7" filter="url(#glow)"/>

    <!-- Nosepiece -->
    <ellipse cx="115" cy="130" rx="28" ry="10" fill="#0f2040" stroke="#2a4070" stroke-width="1.5" filter="url(#sh)"/>

    <!-- Objectives -->
    <rect x="109" y="130" width="12" height="34" rx="4" fill="url(#body)" stroke="#2a4070" stroke-width="1"/>
    <ellipse cx="115" cy="165" rx="8" ry="3.5" fill="url(#lensG)" filter="url(#glow)"/>
    <rect x="90" y="131" width="9" height="20" rx="3" fill="url(#body)" stroke="#2a4070" stroke-width="1"/>
    <ellipse cx="95" cy="152" rx="5" ry="2.5" fill="#0f9b8e" opacity="0.7"/>
    <rect x="130" y="131" width="9" height="24" rx="3" fill="url(#body)" stroke="#2a4070" stroke-width="1"/>
    <ellipse cx="134" cy="156" rx="5" ry="2.5" fill="#0f9b8e" opacity="0.7"/>

    <!-- Stage -->
    <rect x="46" y="172" width="140" height="14" rx="5" fill="url(#bodyLight)" stroke="#2a4070" stroke-width="1.2" filter="url(#sh)"/>
    <rect x="96" y="165" width="40" height="10" rx="2" fill="#0a1428" stroke="#2a4070" stroke-width="1"/>
    <ellipse cx="116" cy="170" rx="14" ry="4" fill="url(#specimenG)" opacity="0.8" filter="url(#softglow)"/>

    <!-- Focus knobs -->
    <ellipse cx="148" cy="148" rx="7" ry="11" fill="#0f2040" stroke="#2a4070" stroke-width="1.5" filter="url(#sh)"/>
    <ellipse cx="148" cy="148" rx="4.5" ry="7.5" fill="#1a3060"/>
    <ellipse cx="190" cy="148" rx="7" ry="11" fill="#0f2040" stroke="#2a4070" stroke-width="1.5" filter="url(#sh)"/>
    <ellipse cx="190" cy="148" rx="4.5" ry="7.5" fill="#1a3060"/>
    <ellipse cx="148" cy="132" rx="5" ry="8" fill="#0f2040" stroke="#2a4070" stroke-width="1.2" filter="url(#sh)"/>
    <ellipse cx="190" cy="132" rx="5" ry="8" fill="#0f2040" stroke="#2a4070" stroke-width="1.2" filter="url(#sh)"/>

    <!-- XY stage knobs -->
    <ellipse cx="60" cy="192" rx="9" ry="6" fill="#0f2040" stroke="#2a4070" stroke-width="1.2" filter="url(#sh)"/>
    <ellipse cx="80" cy="192" rx="7" ry="5" fill="#0f2040" stroke="#2a4070" stroke-width="1.2" filter="url(#sh)"/>
  </g>

  <!-- ══ "?" badge — top right ══ -->
  <!-- Outer glow ring -->
  <circle cx="200" cy="56" r="34" fill="#0f9b8e" opacity="0.12" filter="url(#softglow)"/>
  <!-- Circle background -->
  <circle cx="200" cy="56" r="28" fill="#0a1e3a" stroke="#0f9b8e" stroke-width="2.5" filter="url(#sh)"/>
  <!-- Inner tint -->
  <circle cx="200" cy="56" r="24" fill="#0d2440" opacity="0.7"/>
  <!-- The ? glyph -->
  <text x="200" y="66"
        text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="32" font-weight="800"
        fill="url(#lensG)" filter="url(#glow)">?</text>
  <!-- Subtle shine on circle -->
  <ellipse cx="193" cy="44" rx="8" ry="5" fill="#ffffff" opacity="0.06"/>
</svg>
