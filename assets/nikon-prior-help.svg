<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#1e2f5e"/>
      <stop offset="100%" stop-color="#0d1220"/>
    </radialGradient>
    <linearGradient id="bookGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a7a"/>
      <stop offset="100%" stop-color="#0f2a5a"/>
    </linearGradient>
    <linearGradient id="pageGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8eaf0"/>
      <stop offset="100%" stop-color="#c8ccd8"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="44" fill="url(#bgGrad)"/>

  <!-- ── Book spine ── -->
  <rect x="68" y="48" width="24" height="164" rx="6" fill="#0a1e48" filter="url(#shadow)"/>
  <!-- Spine highlight -->
  <rect x="70" y="52" width="6" height="156" rx="3" fill="#1a3a7a" opacity="0.6"/>

  <!-- ── Book cover (back) ── -->
  <rect x="82" y="52" width="106" height="156" rx="6" fill="url(#bookGrad)" filter="url(#shadow)"/>

  <!-- ── Pages block ── -->
  <rect x="88" y="56" width="96" height="148" rx="2" fill="url(#pageGrad)"/>
  <!-- Page edge lines (depth effect) -->
  <rect x="86" y="57" width="96" height="146" rx="2" fill="#d8dce8" opacity="0.5"/>
  <rect x="84" y="58" width="96" height="144" rx="2" fill="#ccd0e0" opacity="0.35"/>

  <!-- ── Front cover (slightly offset = open book feel) ── -->
  <rect x="90" y="54" width="96" height="150" rx="5" fill="url(#bookGrad)" filter="url(#shadow)"/>
  <!-- Cover texture highlight -->
  <rect x="94" y="58" width="10" height="142" rx="5" fill="#2a4a8a" opacity="0.3"/>

  <!-- ── Cover title area ── -->
  <!-- Microscope icon on cover (small) -->
  <rect x="112" y="72" width="48" height="4" rx="2" fill="#0f9b8e" opacity="0.9"/>
  <rect x="120" y="82" width="32" height="3" rx="1.5" fill="#0f9b8e" opacity="0.7"/>
  <rect x="116" y="90" width="40" height="3" rx="1.5" fill="#0f9b8e" opacity="0.7"/>

  <!-- Small microscope silhouette on cover -->
  <g transform="translate(122, 108) scale(0.38)" opacity="0.85">
    <!-- base -->
    <rect x="-38" y="90" width="76" height="12" rx="5" fill="#0f9b8e"/>
    <!-- stand -->
    <rect x="-8" y="-30" width="16" height="124" rx="4" fill="#1a5a8a"/>
    <!-- arm -->
    <rect x="-32" y="-32" width="50" height="10" rx="4" fill="#1a5a8a"/>
    <!-- head -->
    <rect x="-36" y="-62" width="40" height="36" rx="6" fill="#1a5a8a"/>
    <!-- eyepiece -->
    <rect x="-44" y="-76" width="18" height="22" rx="6" fill="#1a5a8a"/>
    <ellipse cx="-35" cy="-76" rx="7" ry="4" fill="#0f9b8e"/>
    <!-- stage -->
    <rect x="-30" y="28" width="60" height="10" rx="4" fill="#1a5a8a"/>
    <!-- specimen -->
    <ellipse cx="0" cy="33" rx="14" ry="4" fill="#e94560" opacity="0.85"/>
    <!-- objective -->
    <rect x="-6" y="38" width="12" height="20" rx="3" fill="#1a5a8a"/>
    <ellipse cx="0" cy="59" rx="7" ry="3.5" fill="#0f9b8e"/>
  </g>

  <!-- Cover text lines -->
  <rect x="106" y="168" width="60" height="5" rx="2.5" fill="#e94560" opacity="0.9"/>
  <rect x="112" y="178" width="48" height="4" rx="2" fill="#7090b0" opacity="0.7"/>
  <rect x="118" y="187" width="36" height="3" rx="1.5" fill="#7090b0" opacity="0.5"/>

  <!-- ── Bookmark ribbon ── -->
  <polygon points="164,54 174,54 174,84 169,78 164,84" fill="#e94560" filter="url(#shadow)"/>

  <!-- ── "?" help symbol — glowing overlay ── -->
  <circle cx="194" cy="60" r="28" fill="#0f9b8e" opacity="0.15" filter="url(#glow)"/>
  <circle cx="194" cy="60" r="22" fill="#0a1e3a" stroke="#0f9b8e" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="194" y="68" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
        font-size="26" font-weight="700" fill="#0f9b8e">?</text>
  <!-- glow ring -->
  <circle cx="194" cy="60" r="22" fill="none" stroke="#1fd6c0" stroke-width="1" opacity="0.4"/>
</svg>
