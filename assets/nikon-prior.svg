<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#1e2f5e"/>
      <stop offset="100%" stop-color="#0d1220"/>
    </radialGradient>
    <!-- Teal glow for lens -->
    <radialGradient id="lensGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1fd6c0"/>
      <stop offset="60%" stop-color="#0f9b8e"/>
      <stop offset="100%" stop-color="#0a6b60"/>
    </radialGradient>
    <!-- Stage specimen glow -->
    <radialGradient id="specimenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b7a"/>
      <stop offset="100%" stop-color="#e94560"/>
    </radialGradient>
    <!-- Light beam -->
    <linearGradient id="lightBeam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f9b8e" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0f9b8e" stop-opacity="0"/>
    </linearGradient>
    <!-- Body gradient -->
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a3a7a"/>
      <stop offset="100%" stop-color="#0f2a5a"/>
    </linearGradient>
    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect width="256" height="256" rx="44" fill="url(#bgGrad)"/>

  <!-- ── Light beam (below stage) ── -->
  <polygon points="100,168 156,168 140,210 116,210" fill="url(#lightBeam)" opacity="0.45"/>

  <!-- ── Base ── -->
  <rect x="62" y="212" width="132" height="20" rx="10" fill="url(#bodyGrad)" filter="url(#shadow)"/>
  <!-- Base foot detail -->
  <rect x="74" y="210" width="108" height="6" rx="3" fill="#1a3a7a"/>

  <!-- ── Vertical arm / stand ── -->
  <rect x="108" y="80" width="24" height="138" rx="6" fill="url(#bodyGrad)" filter="url(#shadow)"/>
  <!-- Arm highlight stripe -->
  <rect x="111" y="82" width="5" height="134" rx="2.5" fill="#2a4a8a" opacity="0.6"/>

  <!-- ── Curved arm (connects stand to head) ── -->
  <path d="M 108 92 Q 80 88 72 62 Q 68 44 82 36 L 96 36 Q 84 42 88 58 Q 94 78 108 82 Z"
        fill="url(#bodyGrad)" filter="url(#shadow)"/>

  <!-- ── Head / binocular body ── -->
  <rect x="66" y="28" width="60" height="46" rx="10" fill="url(#bodyGrad)" filter="url(#shadow)"/>
  <!-- Head highlight -->
  <rect x="70" y="32" width="8" height="38" rx="4" fill="#2a4a8a" opacity="0.5"/>

  <!-- ── Eyepieces ── -->
  <!-- Left eyepiece -->
  <rect x="68" y="14" width="22" height="26" rx="8" fill="url(#bodyGrad)" filter="url(#shadow)"/>
  <ellipse cx="79" cy="14" rx="9" ry="5" fill="#0f1830"/>
  <ellipse cx="79" cy="14" rx="6" ry="3" fill="url(#lensGlow)" filter="url(#glow)"/>
  <ellipse cx="76" cy="13" rx="2" ry="1.2" fill="#7fffe8" opacity="0.5"/>

  <!-- Right eyepiece -->
  <rect x="96" y="14" width="22" height="26" rx="8" fill="url(#bodyGrad)" filter="url(#shadow)"/>
  <ellipse cx="107" cy="14" rx="9" ry="5" fill="#0f1830"/>
  <ellipse cx="107" cy="14" rx="6" ry="3" fill="url(#lensGlow)" filter="url(#glow)"/>
  <ellipse cx="104" cy="13" rx="2" ry="1.2" fill="#7fffe8" opacity="0.5"/>

  <!-- ── Nosepiece / turret ── -->
  <ellipse cx="128" cy="146" rx="26" ry="10" fill="#0f2a5a" stroke="#2a4a8a" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- ── Objectives (3) ── -->
  <!-- Long centre objective (in position) -->
  <rect x="122" y="146" width="12" height="30" rx="4" fill="#1a3a7a" stroke="#2a4a8a" stroke-width="1"/>
  <ellipse cx="128" cy="178" rx="8" ry="4" fill="url(#lensGlow)" filter="url(#glow)"/>
  <ellipse cx="126" cy="176" rx="2.5" ry="1.5" fill="#afffff" opacity="0.45"/>

  <!-- Short objective left -->
  <rect x="103" y="147" width="9" height="18" rx="3" fill="#1a3a7a" stroke="#2a4a8a" stroke-width="1"/>
  <ellipse cx="107" cy="166" rx="5" ry="2.5" fill="#0f9b8e" opacity="0.7"/>

  <!-- Short objective right -->
  <rect x="144" y="147" width="9" height="22" rx="3" fill="#1a3a7a" stroke="#2a4a8a" stroke-width="1"/>
  <ellipse cx="148" cy="170" rx="5" ry="2.5" fill="#0f9b8e" opacity="0.7"/>

  <!-- ── Stage ── -->
  <rect x="82" y="157" width="92" height="14" rx="6" fill="url(#bodyGrad)" stroke="#2a4a8a" stroke-width="1.5" filter="url(#shadow)"/>
  <!-- Stage highlight -->
  <rect x="86" y="159" width="84" height="4" rx="2" fill="#2a4a8a" opacity="0.5"/>

  <!-- ── Specimen on stage ── -->
  <rect x="110" y="151" width="36" height="8" rx="2" fill="#0d1830" stroke="#2a4a8a" stroke-width="1"/>
  <!-- Specimen glow (sample) -->
  <ellipse cx="128" cy="155" rx="10" ry="3.5" fill="url(#specimenGlow)" opacity="0.85" filter="url(#glow)"/>
  <ellipse cx="128" cy="155" rx="5" ry="1.8" fill="#ff9faa" opacity="0.5"/>

  <!-- ── Coarse / fine focus knobs ── -->
  <!-- Coarse -->
  <ellipse cx="136" cy="122" rx="14" ry="9" fill="#0f2a5a" stroke="#2a4a8a" stroke-width="1.5" filter="url(#shadow)"/>
  <ellipse cx="136" cy="122" rx="10" ry="6" fill="#1a3a7a"/>
  <!-- knob lines -->
  <line x1="126" y1="122" x2="146" y2="122" stroke="#2a4a8a" stroke-width="1"/>
  <line x1="128" y1="118" x2="144" y2="126" stroke="#2a4a8a" stroke-width="0.8"/>
  <line x1="128" y1="126" x2="144" y2="118" stroke="#2a4a8a" stroke-width="0.8"/>

  <!-- Fine focus (smaller) -->
  <ellipse cx="136" cy="108" rx="10" ry="6" fill="#0f2a5a" stroke="#2a4a8a" stroke-width="1.2" filter="url(#shadow)"/>
  <ellipse cx="136" cy="108" rx="7" ry="4" fill="#1a3a7a"/>

  <!-- ── Condenser (below stage) ── -->
  <rect x="118" y="171" width="20" height="12" rx="4" fill="#1a3a7a" stroke="#2a4a8a" stroke-width="1"/>
  <ellipse cx="128" cy="184" rx="10" ry="4" fill="#0f2a5a" stroke="#2a4a8a" stroke-width="1"/>

  <!-- ── Accent dot (brand colour) ── -->
  <circle cx="212" cy="44" r="14" fill="#e94560" opacity="0.92" filter="url(#shadow)"/>
  <circle cx="212" cy="44" r="9" fill="#ff6b7a" opacity="0.6"/>
  <circle cx="209" cy="41" r="3" fill="#ffaaaa" opacity="0.5"/>
</svg>
